name: Cloudflare WoT Analytics

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at midnight UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

jobs:
  export-analytics:
    runs-on: ubuntu-latest
    permissions:
      issues: write         # Required to create issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Run analytics export
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          chmod +x cf_wot_analytics.sh

          # Compute last week's date range (Mon–Sun)
          DATE_END=$(date -u -d 'last saturday' +%Y-%m-%d)
          DATE_START=$(date -u -d 'last saturday - 6 days' +%Y-%m-%d)

          echo "Exporting analytics for $DATE_START → $DATE_END"
          bash cf_wot_analytics.sh "$DATE_START" "$DATE_END"

          OUTPUT_DIR=$(ls -dt cf_analytics_* | head -1)
          zip -r analytics.zip "$OUTPUT_DIR"
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "DATE_START=$DATE_START" >> "$GITHUB_ENV"
          echo "DATE_END=$DATE_END" >> "$GITHUB_ENV"

      - name: Upload CSVs as workflow artifact
        uses: actions/upload-artifact@v4
        id: artifact-upload
        with:
          name: wot-analytics-${{ env.DATE_START }}_${{ env.DATE_END }}
          path: analytics.zip
          retention-days: 90

      - name: Create summary issue with CSV previews
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECIPIENTS: ${{ secrets.ANALYTICS_RECIPIENTS }}  # comma-separated GitHub usernames: user1,user2
          DATE_START: ${{ env.DATE_START }}
          DATE_END: ${{ env.DATE_END }}
          ARTIFACT_URL: ${{ steps.artifact-upload.outputs.artifact-url }}
        run: |
          OUTPUT_DIR=$(ls -dt cf_analytics_* | head -1)

          # Build a mention string from the recipients secret (@user1 @user2 …)
          MENTIONS=""
          IFS=',' read -ra USERS <<< "$RECIPIENTS"
          for U in "${USERS[@]}"; do
            U=$(echo "$U" | xargs)
            MENTIONS="$MENTIONS @$U"
          done

          # Helper: render a CSV file as a markdown table (header + up to 20 rows)
          csv_to_md() {
            local file="$1"
            local title="$2"
            if [[ ! -f "$file" ]]; then
              echo "_File not found: $(basename "$file")_"
              return
            fi
            echo "### $title"
            echo '```'
            head -21 "$file"
            local total
            total=$(wc -l < "$file")
            if (( total > 21 )); then
              echo "… $((total - 21)) more rows in the attached zip"
            fi
            echo '```'
            echo ""
          }

          BODY="## Cloudflare /WoT/ Analytics — ${DATE_START} → ${DATE_END}

          $MENTIONS — your weekly analytics report is ready.

          📦 **[Download all CSVs (zip)](${ARTIFACT_URL})**
          _(link valid for 90 days — requires access to this repository)_

          ---

          $(csv_to_md "$OUTPUT_DIR/01_traffic_overview_hourly.csv" "01 · Traffic overview (hourly visits)")

          $(csv_to_md "$OUTPUT_DIR/02_requests_by_country.csv" "02 · Visits by country")

          $(csv_to_md "$OUTPUT_DIR/03_top_paths.csv" "03 · Top paths")

          $(csv_to_md "$OUTPUT_DIR/04_user_agents.csv" "04 · Browser & OS")

          $(csv_to_md "$OUTPUT_DIR/05_device_types.csv" "05 · Device types")

          $(csv_to_md "$OUTPUT_DIR/06_asn_breakdown.csv" "06 · ASN / ISP breakdown")

          ---
          _Generated automatically by GitHub Actions on $(date -u '+%Y-%m-%d %H:%M UTC')_"

          gh issue create \
            --title "📊 WoT Analytics — ${DATE_START} → ${DATE_END}" \
            --body "$BODY" \
            --label "analytics" \
            --assignee "$( IFS=','; echo "${USERS[*]}" | tr ' ' ',' )"
